<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>AskFlow Widget Embed Example</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 2rem;
      }
      #askflow-launcher {
        position: fixed;
        right: 20px;
        bottom: 20px;
        z-index: 9999;
      }
      #askflow-launcher button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        background: #2563eb;
        color: #fff;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(37, 99, 235, 0.35);
      }
      #askflow-frame {
        position: fixed;
        right: 20px;
        bottom: 72px;
        width: 380px;
        height: 560px;
        border: 0;
        border-radius: 16px;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.18);
        display: none;
        z-index: 9999;
        background: #fff;
      }
      #askflow-frame.open {
        display: block;
      }
    </style>
  </head>
  <body>
    <h1>官网示例</h1>
    <p>右下角挂件对接 AskFlow 访客通道（PRD E7a）。</p>
    <!-- Embed: set data-src to your AskFlow origin + /widget -->
    <iframe
      id="askflow-frame"
      title="AskFlow Widget"
      data-src="/widget"
      src="about:blank"
    ></iframe>
    <div id="askflow-launcher">
      <button type="button" id="askflow-toggle">在线客服</button>
    </div>
    <script>
      (function () {
        var frame = document.getElementById("askflow-frame");
        var btn = document.getElementById("askflow-toggle");
        var opened = false;
        btn.addEventListener("click", function () {
          opened = !opened;
          if (opened && frame.src === "about:blank") {
            frame.src = frame.getAttribute("data-src") || "/widget";
          }
          frame.classList.toggle("open", opened);
          btn.textContent = opened ? "关闭" : "在线客服";
        });
      })();
    </script>
  </body>
</html>
