# AskFlow local dependencies (PRD §3.4)
# Usage: docker compose -f infra/compose/dev/docker-compose.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: askflow
      POSTGRES_PASSWORD: askflow
      POSTGRES_DB: askflow
    ports:
      - "5432:5432"
    volumes:
      - askflow_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U askflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: askflow
      MINIO_ROOT_PASSWORD: askflowsecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - askflow_minio:/data

  # Optional vector store (pair with CHROMA_HOST=localhost CHROMA_PORT=8001)
  chroma:
    image: chromadb/chroma:0.5.23
    ports:
      - "8001:8000"
    volumes:
      - askflow_chroma:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"

volumes:
  askflow_pg:
  askflow_minio:
  askflow_chroma:
